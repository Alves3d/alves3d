<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo — Alves.3D</title>
<link rel="icon" type="image/png" href="favicon.png">
<meta name="description" content="Catálogo completo de peças 3D personalizadas da Alves.3D. Chaveiros, decoração, utilidades, geek e muito mais.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --bg2: #0f0f0f;
  --surface: #141414;
  --surface2: #1c1c1c;
  --accent: #4176e1;
  --accent2: #5b8ff9;
  --text: #f0ede6;
  --text2: #a8a49e;
  --border: rgba(255,255,255,0.07);
  --serif: 'Bebas Neue', sans-serif;
  --sans: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); overflow-x: hidden; }

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9998;
}

/* NAV */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 48px;
  background: rgba(8,8,8,0.92);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
}

.nav-logo {
  font-family: var(--serif);
  font-size: 24px;
  letter-spacing: 3px;
  color: var(--text);
  text-decoration: none;
}

.nav-logo em { color: var(--accent); font-style: normal; }

.nav-back {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text2);
  text-decoration: none;
  font-size: 13px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: color 0.2s;
  font-family: var(--mono);
}

.nav-back:hover { color: var(--text); }

.nav-wpp {
  background: #25D366;
  color: #000;
  padding: 10px 20px;
  border-radius: 100px;
  font-weight: 600;
  font-size: 13px;
  text-decoration: none;
  transition: all 0.2s;
}

.nav-wpp:hover { background: #1db954; transform: translateY(-1px); }

/* LAYOUT */
.page {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: 100vh;
  padding-top: 73px;
}

/* SIDEBAR */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 36px 24px;
  position: sticky;
  top: 73px;
  height: calc(100vh - 73px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.sidebar-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text2);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-title::before {
  content: '';
  width: 16px; height: 1px;
  background: var(--accent);
}

/* SEARCH */
.search-wrap {
  position: relative;
  margin-bottom: 28px;
}

.search-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  padding: 10px 14px 10px 36px;
  outline: none;
  transition: border-color 0.2s;
}

.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text2); }

.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text2);
  font-size: 14px;
}

/* FILTERS */
.filter-group { margin-bottom: 28px; }

.cat-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  background: none;
  border: none;
  color: var(--text2);
  font-family: var(--sans);
  font-size: 14px;
  padding: 10px 12px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  margin-bottom: 2px;
}

.cat-btn:hover { background: var(--surface2); color: var(--text); }
.cat-btn.active { background: rgba(65,118,225,0.12); color: var(--accent); border: 1px solid rgba(65,118,225,0.2); }

.cat-count {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--surface2);
  padding: 2px 7px;
  border-radius: 100px;
}

.cat-btn.active .cat-count {
  background: rgba(65,118,225,0.2);
  color: var(--accent);
}

/* SORT */
.sort-select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  appearance: none;
  cursor: pointer;
  transition: border-color 0.2s;
}

.sort-select:focus { border-color: var(--accent); }

/* MAIN */
.main { padding: 36px 40px; }

.main-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  flex-wrap: wrap;
  gap: 16px;
}

.main-title {
  font-family: var(--serif);
  font-size: 36px;
  letter-spacing: 2px;
  line-height: 1;
}

.main-title span { color: var(--accent); }

.results-count {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text2);
  letter-spacing: 0.1em;
}

/* GRID */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 16px;
}

/* PRODUCT CARD */
.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: all 0.3s;
  display: flex;
  flex-direction: column;
  cursor: pointer;
}

.product-card:hover {
  border-color: var(--accent);
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(65,118,225,0.1);
}

.product-img {
  width: 100%;
  aspect-ratio: 1;
  overflow: hidden;
  background: var(--surface2);
  position: relative;
}

.product-img img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  transition: transform 0.4s ease;
  background: var(--surface2);
}

.product-card:hover .product-img img { transform: scale(1.06); }

.product-img-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  color: var(--text2);
  opacity: 0.3;
}

.product-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

.product-cat {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
}

.product-name {
  font-family: var(--serif);
  font-size: 20px;
  letter-spacing: 1px;
  line-height: 1.1;
  color: var(--text);
}

.product-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.product-meta {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 4px;
}

.meta-tag {
  font-size: 10px;
  font-family: var(--mono);
  padding: 2px 8px;
  border-radius: 3px;
  border: 1px solid var(--border);
  color: var(--text2);
}

.product-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
}

.product-price {
  font-family: var(--serif);
  font-size: 28px;
  letter-spacing: 1px;
  color: var(--text);
  line-height: 1;
}

.product-price small {
  font-family: var(--sans);
  font-size: 11px;
  color: var(--text2);
  display: block;
  font-weight: 400;
  letter-spacing: 0;
}

.product-wpp {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #25D366;
  color: #000;
  padding: 8px 14px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 700;
  text-decoration: none;
  transition: all 0.2s;
  white-space: nowrap;
}

.product-wpp:hover { background: #1db954; transform: translateY(-1px); }

/* EMPTY STATE */
.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 80px 20px;
}

.empty-state-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
.empty-state-title { font-family: var(--serif); font-size: 28px; letter-spacing: 2px; margin-bottom: 8px; }
.empty-state-desc { font-size: 14px; color: var(--text2); }



/* LOADING */
.loading {
  grid-column: 1 / -1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 80px;
  color: var(--text2);
}

.loading-spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* MOBILE FILTER BTN */
.mobile-filter-btn {
  display: none;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 14px;
  border-radius: 100px;
  font-size: 13px;
  font-family: var(--sans);
  cursor: pointer;
  transition: all .2s;
}
.mobile-filter-btn:hover { border-color: var(--accent); color: var(--accent); }

/* MOBILE */
@media (max-width: 768px) {
  nav { padding: 16px 20px; }
  .mobile-filter-btn { display: flex; }
  .page { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed;
    top: 73px; left: 0; bottom: 0;
    width: 280px;
    z-index: 90;
    transform: translateX(-100%);
    transition: transform .3s ease;
    border-right: 1px solid var(--border);
    border-bottom: none;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 89;
    display: none;
  }
  .sidebar-overlay.active { display: block; }
  .main { padding: 20px; }
  .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .modal-overlay { padding: 12px; align-items: flex-end; }
  .modal { grid-template-columns: 1fr; max-height: 90vh; border-radius: 14px 14px 8px 8px; }
  .modal-img { border-radius: 12px 12px 0 0; aspect-ratio: 16/9; }
  .modal-img img { border-radius: 12px 12px 0 0; }
  .modal-body { padding: 20px; }
  .modal-name { font-size: 28px; }
  .modal-price-val { font-size: 40px; }
  .modal-specs { grid-template-columns: 1fr 1fr; }
  .nav-back span { display: none; }
}
</style>

</head>
<body>

<nav>
  <a href="index.html" class="nav-back">← Voltar</a>
  <a href="index.html" class="nav-logo">ALVES<em>.3D</em></a>
  <div style="display:flex;gap:10px;align-items:center">
    <button class="mobile-filter-btn" onclick="toggleSidebar()" id="filterBtn">☰ Filtros</button>
    <a href="https://wa.me/5516992364004?text=Olá! Vim pelo catálogo e quero fazer um pedido!" target="_blank" class="nav-wpp">WhatsApp</a>
  </div>
</nav>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="page">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">Buscar</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="Ex: chaveiro, vaso..." oninput="filterProducts()">
    </div>

    <div class="sidebar-title">Categorias</div>
    <div class="filter-group" id="catFilters">
      <button class="cat-btn active" data-cat="Todos" onclick="setCat('Todos')">
        Todos <span class="cat-count" id="count-todos">0</span>
      </button>
    </div>

    <div class="sidebar-title">Ordenar por</div>
    <select class="sort-select" id="sortSelect" onchange="filterProducts()">
      <option value="default">Padrão</option>
      <option value="price-asc">Menor preço</option>
      <option value="price-desc">Maior preço</option>
      <option value="name-asc">Nome A–Z</option>
    </select>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="main-header">
      <div>
        <div class="main-title">CATÁLOGO <span id="activeCatTitle">COMPLETO</span></div>
        <div class="results-count" id="resultsCount">Carregando...</div>
      </div>
    </div>
    <div class="products-grid" id="productsGrid">
      <div class="loading">
        <div class="loading-spinner"></div>
        <span>Carregando produtos...</span>
      </div>
    </div>
  </main>
</div>



<script>
let allProducts = [];
let activeCat = 'Todos';

// LOAD PRODUCTS
async function loadProducts() {
  try {
    const res = await fetch('produtos.json?v=' + Date.now());
    allProducts = await res.json();
    buildCatFilters();
    filterProducts();
  } catch(e) {
    document.getElementById('productsGrid').innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">⚠️</div>
        <div class="empty-state-title">ARQUIVO NÃO ENCONTRADO</div>
        <div class="empty-state-desc">Verifique se o arquivo produtos.json está na raiz do repositório.</div>
      </div>`;
  }
}

// BUILD CATEGORY FILTERS
function buildCatFilters() {
  const cats = ['Todos', ...new Set(allProducts.map(p => p.categoria))];
  const container = document.getElementById('catFilters');
  container.innerHTML = '';

  cats.forEach(cat => {
    const count = cat === 'Todos' ? allProducts.length : allProducts.filter(p => p.categoria === cat).length;
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === activeCat ? ' active' : '');
    btn.dataset.cat = cat;
    btn.innerHTML = `${cat} <span class="cat-count">${count}</span>`;
    btn.onclick = () => setCat(cat);
    container.appendChild(btn);
  });
}

// setCat defined below

// FILTER & RENDER
function filterProducts() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const sort = document.getElementById('sortSelect').value;

  let filtered = allProducts.filter(p => {
    const matchCat = activeCat === 'Todos' || p.categoria === activeCat;
    const matchQ = !q || p.nome.toLowerCase().includes(q) || p.descricao.toLowerCase().includes(q) || (p.tags && p.tags.some(t => t.toLowerCase().includes(q)));
    return matchCat && matchQ;
  });

  if (sort === 'price-asc') filtered.sort((a,b) => a.preco - b.preco);
  else if (sort === 'price-desc') filtered.sort((a,b) => b.preco - a.preco);
  else if (sort === 'name-asc') filtered.sort((a,b) => a.nome.localeCompare(b.nome));

  document.getElementById('resultsCount').textContent = `${filtered.length} produto${filtered.length !== 1 ? 's' : ''} encontrado${filtered.length !== 1 ? 's' : ''}`;
  renderProducts(filtered);
}

function renderProducts(products) {
  const grid = document.getElementById('productsGrid');
  if (products.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🔍</div>
        <div class="empty-state-title">NENHUM PRODUTO</div>
        <div class="empty-state-desc">Tente outros termos ou selecione outra categoria.</div>
      </div>`;
    return;
  }

  grid.innerHTML = products.map(p => `
    <div class="product-card" onclick="location.href='produto.html?id=${encodeURIComponent(String(p.id))}'">
      <div class="product-img">
        <img src="${(p.imagens&&p.imagens[0])||p.imagem||''}" alt="${p.nome}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="product-img-placeholder" style="display:none">🖨️</div>
      </div>
      <div class="product-body">
        <div class="product-cat">${p.categoria}</div>
        <div class="product-name">${p.nome}</div>
        <div class="product-desc">${p.descricao}</div>
        <div class="product-meta">
          ${(p.tags || []).slice(0,3).map(t => `<span class="meta-tag">${t}</span>`).join('')}
        </div>
      </div>
      <div class="product-footer">
        <div class="product-price">
          <small>a partir de</small>
          R$${p.preco}
        </div>
        <a href="${buildWppLink(p)}" target="_blank" class="product-wpp" onclick="event.stopPropagation()" onclick="event.stopPropagation()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Pedir
        </a>
      </div>
    </div>
  `).join('');
}

function buildWppLink(p) {
  const msg = `Olá! Vi o catálogo e tenho interesse em:\n\nProduto: ${p.nome}\nCategoria: ${p.categoria}\nPreço: R$${p.preco}\n\nPoderia me passar mais informações?`;
  return `https://wa.me/5516992364004?text=${encodeURIComponent(msg)}`;
}

// MODAL
function openModal(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;

  document.getElementById('modalImg').innerHTML = `
    <img src="${(p.imagens&&p.imagens[0])||p.imagem||''}" alt="${p.nome}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="modal-img-placeholder" style="display:none">🖨️</div>`;

  document.getElementById('modalBody').innerHTML = `
    <div class="modal-cat">${p.categoria}</div>
    <div class="modal-name">${p.nome}</div>
    <div class="modal-desc">${p.descricao}</div>
    <div class="modal-specs">
      <div class="spec-item"><div class="spec-label">Material</div><div class="spec-val">${p.material}</div></div>
      <div class="spec-item"><div class="spec-label">Tamanho</div><div class="spec-val">${p.tamanho}</div></div>
    </div>
    <div class="modal-tags">${(p.tags||[]).map(t=>`<span class="modal-tag">${t}</span>`).join('')}</div>
    <div class="modal-price">
      <div class="modal-price-val">R$${p.preco}</div>
      <div class="modal-price-label">a partir de</div>
    </div>
    <a href="${buildWppLink(p)}" target="_blank" class="modal-wpp">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Quero esse produto

  window.scrollTo({top: 0, behavior: 'instant'});
  document.documentElement.classList.add('modal-open');
  document.body.classList.add('modal-open');
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('active');
  document.getElementById('modal').scrollTop = 0;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.documentElement.classList.remove('modal-open');
  document.body.classList.remove('modal-open');
}

function closeModalOverlay(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  const btn = document.getElementById('filterBtn');
  const isOpen = sidebar.classList.toggle('open');
  overlay.classList.toggle('active', isOpen);
  btn.textContent = isOpen ? '× Fechar' : '☰ Filtros';
}

// Close sidebar when category selected on mobile
function setCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  document.getElementById('activeCatTitle').textContent = cat === 'Todos' ? 'COMPLETO' : cat.toUpperCase();
  filterProducts();
  if (window.innerWidth <= 768) toggleSidebar();
}

loadProducts();
</script>
